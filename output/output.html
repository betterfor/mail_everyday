            <div style="margin:10px auth; width:85%; color:#5f5e5e">人们普遍觉得努力必然有回报——熬夜做题，选定风口投身创业，坚持不被周围人理解的梦想。可有时命运的潮水与人的方向相反，尽力划水却被推回，梦想的彼岸看似近在眼前，实则远在天涯。有时，人无法上岸并非做错了什么，只是那无形的手，没有将砝码压在命运天平靠自己的那一侧。

本周，ONE与你一起见证那些无法挽回的故事。
